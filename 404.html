<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada | Avantik</title>
  <meta name="description" content="A página que você procura não existe ou foi movida.">
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header" id="header">
    <nav class="header__nav container">
      <a href="/" class="header__logo">
        <img src="/.netlify/images?url=/images/logo.png&w=300&q=85&fm=webp" alt="Avantik" class="header__logo-img" width="150" height="40">
      </a>
    </nav>
  </header>

  <main>
    <section style="min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:6rem 1.5rem 4rem;background:linear-gradient(180deg,#1C1C1E 0%,#26262A 100%);color:#fff;text-align:center;">
      <div style="max-width:560px">
        <p style="font-size:0.75rem;font-weight:600;letter-spacing:0.2em;color:var(--color-accent);text-transform:uppercase;margin-bottom:1rem">Erro 404</p>
        <h1 style="font-family:var(--font-heading);font-size:clamp(2.5rem,6vw,4rem);line-height:1.1;margin-bottom:1rem">Página não encontrada</h1>
        <p style="font-size:1.0625rem;color:rgba(255,255,255,0.7);margin-bottom:2.5rem;line-height:1.5">O link que você acessou não existe ou foi movido. Mas a gente te ajuda a continuar.</p>
        <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap">
          <a href="/" class="btn btn--accent btn--lg">Voltar para a home</a>
          <a href="/diretorio/" class="btn btn--outline btn--lg" style="color:#fff;border-color:rgba(255,255,255,0.3)">Ver palestrantes</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
